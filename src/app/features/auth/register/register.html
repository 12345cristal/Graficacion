<main class="register-page">
  <section class="register-card" aria-labelledby="register-title">
    <div class="brand-mark" aria-hidden="true">R</div>

    <header class="register-header">
      <h1 id="register-title">Crear Cuenta</h1>
      <p>Completa el formulario para empezar</p>
    </header>

    <form class="register-form" [formGroup]="registerForm" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Nombre Completo</span>
        <span class="input-shell">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M20 21a8 8 0 0 0-16 0" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input
            type="text"
            formControlName="fullName"
            autocomplete="name"
            placeholder="Juan P&eacute;rez"
          />
        </span>
      </label>

      <label class="field">
        <span>Email</span>
        <span class="input-shell">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4 6h16v12H4z" />
            <path d="m4 7 8 6 8-6" />
          </svg>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="tu@email.com"
          />
        </span>
      </label>

      <label class="field">
        <span>Contrase&ntilde;a</span>
        <span class="input-shell">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="5" y="10" width="14" height="10" rx="2" />
            <path d="M8 10V7a4 4 0 0 1 8 0v3" />
          </svg>
          <input
            type="password"
            formControlName="password"
            autocomplete="new-password"
            placeholder="********"
          />
        </span>
      </label>

      <label class="field">
        <span>Confirmar Contrase&ntilde;a</span>
        <span class="input-shell">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="5" y="10" width="14" height="10" rx="2" />
            <path d="M8 10V7a4 4 0 0 1 8 0v3" />
          </svg>
          <input
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            placeholder="********"
          />
        </span>
      </label>

      @if (registerForm.hasError('passwordsMismatch') && registerForm.touched) {
        <p class="feedback" role="alert">Las contrase&ntilde;as no coinciden.</p>
      }

      @if (message) {
        <p class="feedback" role="status">{{ message }}</p>
      }

      <button class="primary-button" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Creando cuenta...' : 'Crear Cuenta' }}
      </button>
    </form>

    <footer class="auth-footer">
      <span>&iquest;Ya tienes una cuenta?</span>
      <a routerLink="/login">Iniciar Sesi&oacute;n</a>
    </footer>
  </section>
</main>
